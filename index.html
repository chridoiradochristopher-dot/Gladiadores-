<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Gladiadores de Cristo</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; margin: 0;}
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #333; }
        input[type="text"], input[type="date"], select, textarea, input[type="file"] { width: 100%; padding: 10px; margin-top: 8px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-family: inherit;}
        .radio-group { margin-top: 10px; }
        .radio-group label { display: inline; font-weight: normal; margin-right: 15px; cursor: pointer; }
        #producto-desc-container { display: none; background-color: #f9f9f9; padding: 15px; border-left: 4px solid #3498db; margin-top: 10px; border-radius: 4px; }
        button { width: 100%; padding: 14px; background-color: #3498db; color: white; border: none; border-radius: 5px; margin-top: 25px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        #mensaje { text-align: center; margin-top: 15px; font-weight: bold; padding: 10px; border-radius: 5px; }
        .pregunta-larga { font-weight: 600; margin-top: 20px; color: #2c3e50; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro Gladiadores de Cristo</h2>
    <form id="registroForm">
        <label for="nombre">Nombre completo:</label>
        <input type="text" id="nombre" required>

        <label for="fechaNacimiento">Fecha de nacimiento:</label>
        <input type="date" id="fechaNacimiento" required>

        <label for="estadoCivil">Estado civil:</label>
        <select id="estadoCivil" required>
            <option value="">Seleccione una opción</option>
            <option value="Casado Civil">Casado Civil</option>
            <option value="Casado Religioso">Casado Religioso</option>
            <option value="Juntado">Juntado</option>
            <option value="Divorciado">Divorciado</option>
            <option value="Soltero">Soltero</option>
        </select>

        <label for="profesion">Profesión, Oficio o Trabajo:</label>
        <input type="text" id="profesion" required>

        <div class="pregunta-larga">¿Tiene algún producto o servicio que ofrece y desea que lo tengamos como referencia?</div>
        <div class="radio-group">
            <input type="radio" id="prodSi" name="tieneProducto" value="Si" onchange="toggleProductoDesc()"> <label for="prodSi">Sí</label>
            <input type="radio" id="prodNo" name="tieneProducto" value="No" onchange="toggleProductoDesc()" checked> <label for="prodNo">No</label>
        </div>

        <div id="producto-desc-container">
            <label for="descripcionProducto">Describa su producto o servicio:</label>
            <textarea id="descripcionProducto" rows="3"></textarea>
        </div>

        <div class="pregunta-larga">Déjanos tu foto para felicitarte en tu cumpleaños:</div>
        <input type="file" id="foto" accept="image/*" required>

        <button type="submit" id="btnSubmit">Enviar Registro</button>
        <div id="mensaje"></div>
    </form>
</div>

<script>
    function toggleProductoDesc() {
        const siRadio = document.getElementById('prodSi').checked;
        const contenedor = document.getElementById('producto-desc-container');
        const textArea = document.getElementById('descripcionProducto');
        if(siRadio) { contenedor.style.display = 'block'; textArea.required = true; } 
        else { contenedor.style.display = 'none'; textArea.required = false; textArea.value = ""; }
    }

    // --- FUNCIÓN PARA DIBUJAR LA PLANILLA ---
    function generarPlanillaImagen(datos, fotoBase64) {
        return new Promise((resolve) => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 800;
            canvas.height = 1100;

            // Fondo blanco
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Cabecera azul
            ctx.fillStyle = '#1a365d';
            ctx.fillRect(0, 0, canvas.width, 100);
            
            // Título
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GLADIADORES DE CRISTO', canvas.width / 2, 60);

            // Subtítulo
            ctx.fillStyle = '#333333';
            ctx.font = 'bold 24px Arial';
            ctx.fillText('Ficha de Registro', canvas.width / 2, 150);

            // Dibujar los textos de los datos
            ctx.textAlign = 'left';
            ctx.font = '22px Arial';
            let y = 220;
            const lineSpacing = 40;

            const lineas = [
                { label: 'Nombre:', value: datos.nombre },
                { label: 'Nacimiento:', value: datos.fechaNacimiento },
                { label: 'Estado Civil:', value: datos.estadoCivil },
                { label: 'Profesión:', value: datos.profesion },
                { label: '¿Ofrece Producto?:', value: datos.tieneProducto }
            ];

            if (datos.tieneProducto === 'Si') {
                lineas.push({ label: 'Detalle del Producto:', value: datos.descripcionProducto });
            }

            lineas.forEach(linea => {
                ctx.font = 'bold 22px Arial';
                ctx.fillText(linea.label, 80, y);
                ctx.font = '22px Arial';
                // Calculamos el espacio para que el valor empiece justo después de la etiqueta
                const labelWidth = ctx.measureText(linea.label).width;
                
                // Si la descripción es muy larga, la acortamos visualmente para no romper la imagen
                let valor = linea.value;
                if(valor.length > 45) valor = valor.substring(0, 45) + "...";
                
                ctx.fillText(valor, 80 + labelWidth + 10, y);
                y += lineSpacing;
            });

            // Dibujar la foto de la persona en la parte inferior
            const img = new Image();
            img.onload = function() {
                // Ajustar el tamaño de la imagen manteniendo proporciones
                const maxImgWidth = 500;
                const maxImgHeight = 500;
                let finalWidth = img.width;
                let finalHeight = img.height;

                if (finalWidth > maxImgWidth) {
                    finalHeight = finalHeight * (maxImgWidth / finalWidth);
                    finalWidth = maxImgWidth;
                }
                if (finalHeight > maxImgHeight) {
                    finalWidth = finalWidth * (maxImgHeight / finalHeight);
                    finalHeight = maxImgHeight;
                }

                // Centrar la imagen
                const x = (canvas.width - finalWidth) / 2;
                y += 40; // Espacio extra antes de la foto
                
                // Borde para la foto
                ctx.strokeStyle = '#cccccc';
                ctx.lineWidth = 5;
                ctx.strokeRect(x - 5, y - 5, finalWidth + 10, finalHeight + 10);
                
                // Pintar la foto
                ctx.drawImage(img, x, y, finalWidth, finalHeight);

                // Convertir todo el lienzo a Base64 (JPG)
                resolve(canvas.toDataURL('image/jpeg', 0.9));
            };
            img.src = fotoBase64;
        });
    }

    // Procesar el envío
    document.getElementById('registroForm').addEventListener('submit', async function(e) {
        e.preventDefault(); 
        
        const btnSubmit = document.getElementById('btnSubmit');
        const mensaje = document.getElementById('mensaje');
        
        btnSubmit.disabled = true;
        btnSubmit.innerText = "Generando planilla y guardando...";
        mensaje.innerText = "";
        mensaje.style.backgroundColor = "transparent";

        const fileInput = document.getElementById('foto');
        const file = fileInput.files[0];

        const reader = new FileReader();
        reader.onload = async function(event) {
            const fotoBase64Data = event.target.result;

            const payload = {
                nombre: document.getElementById('nombre').value,
                fechaNacimiento: document.getElementById('fechaNacimiento').value,
                estadoCivil: document.getElementById('estadoCivil').value,
                profesion: document.getElementById('profesion').value,
                tieneProducto: document.querySelector('input[name="tieneProducto"]:checked').value,
                descripcionProducto: document.getElementById('descripcionProducto').value,
                fotoBase64: fotoBase64Data,
                fotoName: file.name
            };

            // Llamamos a la función mágica para generar la imagen de la planilla
            payload.planillaBase64 = await generarPlanillaImagen(payload, fotoBase64Data);

            // =========================================================================
            // ¡¡¡ ATENCIÓN !!! PEGA AQUÍ LA NUEVA URL DE GOOGLE APPS SCRIPT
            // =========================================================================
            const scriptURL = "https://script.google.com/macros/s/AKfycbz_jusLcRNNGbe16_0v0nQnvFPMUk7FO_mVhlY4B-qFKg3FZ4P26l07quHJpIJu5Z7O/exec"; 

            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify(payload),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === "success") {
                    mensaje.style.color = "#155724";
                    mensaje.style.backgroundColor = "#d4edda";
                    mensaje.innerText = "¡Registro y planilla generados con éxito!";
                    document.getElementById('registroForm').reset();
                    toggleProductoDesc(); 
                } else {
                    throw new Error(data.message);
                }
            })
            .catch(error => {
                mensaje.style.color = "#721c24";
                mensaje.style.backgroundColor = "#f8d7da";
                mensaje.innerText = "Hubo un error al enviar: " + error.message;
            })
            .finally(() => {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Enviar Registro";
            });
        };
        
        if(file) reader.readAsDataURL(file);
    });
</script>

</body>
</html>
